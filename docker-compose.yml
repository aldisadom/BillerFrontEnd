services:
  frontend:
    image: ${DOCKER_REGISTRY-}frontend    
    container_name: "billio-frontend"
    environment:
      - ASPNETCORE_Kestrel__Certificates__Default__Password=mypassword123456789mypassword
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - ASPNETCORE_ENVIRONMENT=LocalDocker
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
    volumes:
      - ./certs:/https/
      - ./Fonts:/Fonts
    build:
      context: .
      dockerfile: src/FrontEnd/DockerfileLocal
    ports:
     - "8080:8080"
     - "8081:8081"
    networks:
      - billio-network

  pgadmin:
    image: dpage/pgadmin4:9.7.0
    container_name: "billio-pgadmin411"
    restart: always
    ports:
      - "8890:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: postgres@postgres.com
      PGADMIN_DEFAULT_PASSWORD: postgres
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    networks:
      - billio-network

networks:
  billio-network:
    external: true
